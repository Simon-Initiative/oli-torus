    title: Given Remix.create_container/3 is called, then the hierarchy state is
      updated with a new child, has_unsaved_changes is true, and the hierarchy is
      finalized.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/remix/remix_container_test.exs
  - id: AC-010
    title: Given a new container, when the author navigates into it and adds
      materials, then saves, the full structure (container + materials) persists
