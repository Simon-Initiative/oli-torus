- id: FR-001
  title: System SHALL display a "Create Unit/Module/Section" button on the Template
    Customize Content page, with label matching the current hierarchy level, only
    for blueprint sections.
  status: verified
  acceptance_criteria:
  - id: AC-001
    title: Given an authorized author/admin on a blueprint section's Customize Content
      page, then a "Create Unit" button (#create-container-button) is visible.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/live/remix_section_create_container_live_test.exs
  - id: AC-002
    title: Given the author navigates into a unit, then the button label changes
      to "Create Module". Inside a module, it changes to "Create Section".
    status: verified
    verification_method: hybrid
    proofs:
    - type: test
      ref: test/oli_web/live/remix_section_create_container_live_test.exs
    - type: evidence
      ref: manual QA verified (breadcrumb navigation + button label change)
- id: FR-002
  title: When a container is created, system SHALL build an in-memory draft with
    a deterministic negative resource_id. On save, the draft SHALL be materialized
    to real Resource + Revision (resource_scope = :blueprint) + PublishedResource
    records across ALL publications in a single transaction.
  status: verified
  acceptance_criteria:
  - id: AC-003
    title: Given build_draft/4 is called, then it returns a HierarchyNode with
      negative resource_id, correct resource_type (container), and resource_scope
      (:blueprint). No database writes occur.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/remix/container_creation_test.exs
  - id: AC-004
    title: Given materialize/3 is called with draft nodes, then each draft is
      replaced with real positive resource_id, Resource and Revision exist in DB,
      and PublishedResource records cover ALL publications.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/remix/container_creation_test.exs
  - id: AC-005
    title: Given multiple drafts are materialized, then order is preserved and
      non-draft nodes are unchanged.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/remix/container_creation_test.exs
- id: FR-003
  title: System SHALL enforce scope isolation so that containers with resource_scope
    = :blueprint never appear in project-level authoring views.
  status: verified
  acceptance_criteria:
  - id: AC-006
    title: Given a blueprint-scoped container exists in the publication, when
      AuthoringResolver.full_hierarchy is called, then the container is excluded.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/publishing/scope_isolation_test.exs
  - id: AC-007
    title: Given a blueprint-scoped container, when revisions_of_type or
      query_unpublished_revisions_by_type is called for containers, then the
      container is excluded.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/publishing/scope_isolation_test.exs
  - id: AC-008
    title: Given create_revision_from_previous is called on a blueprint-scoped
      revision, then the new revision inherits resource_scope = :blueprint.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/publishing/scope_isolation_test.exs
- id: FR-004
  title: After creating a container, the author SHALL be able to navigate into it,
