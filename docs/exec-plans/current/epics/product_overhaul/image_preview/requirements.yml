version: 1
feature: image_preview
generated_from: prd.md
requirements:
- id: FR-001
  title: System SHALL provide cover-image preview rendering for My Course, Course
    Picker, and Student Welcome contexts.
  status: proposed
  acceptance_criteria:
  - id: AC-001
    title: (FR-001) - Given an authorized template manager selects My Course preview,
      when the preview renders, then the cover image presentation matches the production
      My Course surface, including a scaled full-context composition in the gallery
      rather than a narrow responsive reflow.
    status: proposed
    verification_method: automated
    proofs: []
  - id: AC-002
    title: (FR-001) - Given an authorized template manager selects Course Picker preview,
      when the preview renders, then the cover image presentation matches the production
      Course Picker surface, including a scaled full-context composition in the gallery
      rather than a narrow responsive reflow.
    status: proposed
    verification_method: automated
    proofs: []
  - id: AC-003
    title: (FR-001) - Given an authorized template manager selects Welcome preview,
      when the preview renders, then the cover image presentation matches the production
      Welcome surface, including a scaled full-context composition in the gallery
      rather than a narrow responsive reflow.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-002
  title: System SHALL reuse shared runtime rendering units for each supported context
    so preview and destination surfaces stay synchronized by construction.
  status: proposed
  acceptance_criteria:
  - id: AC-004
    title: (FR-002) - Given a supported context's shared rendering unit changes, when
      tests run, then both the destination surface and preview reflect the same markup
      change without a second preview-only update.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-003
  title: System SHALL place the Cover Image section below Paywall Settings on Template
    Overview and use the design-system upload affordance shown in MER-4052.
  status: proposed
  acceptance_criteria:
  - id: AC-005
    title: (FR-003) - Given Template Overview renders, when the Cover Image section
      is shown, then it appears below Paywall Settings and exposes the browse/drag-drop
      upload affordance in the ticketed design style.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-004
  title: System SHALL show no mockup gallery when no cover image is present, and
    SHALL show a three-mockup gallery when a cover image has been uploaded.
  status: proposed
  acceptance_criteria:
  - id: AC-006
    title: (FR-004) - Given no cover image is selected, when Template Overview loads,
      then no mockups are shown.
    status: proposed
    verification_method: automated
    proofs: []
  - id: AC-007
    title: (FR-004) - Given a cover image upload succeeds, when the Cover Image section
      renders, then a large selected mockup and three context mockups are shown for
      My Course, Course Picker, and Student Welcome, with the selected preview showing
      the full uploaded asset and the three context mockups shown as scaled full-context
      compositions.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-005
  title: System SHALL apply the Figma hover-state drop shadow to cover-image mockups.
  status: proposed
  acceptance_criteria:
  - id: AC-008
    title: (FR-005) - Given an author hovers over a mockup, when the hover state
      is active, then the mockup shows the design-specified drop shadow.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-006
  title: System SHALL open a modal carousel when a mockup is clicked and SHALL let
    the user move through the three context mockups from that modal.
  status: proposed
  acceptance_criteria:
  - id: AC-009
    title: (FR-006) - Given an author clicks a mockup, when the modal opens, then
      the selected mockup is enlarged in a modal view and carousel navigation is
      available across all three mockups.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-007
  title: System SHALL enforce existing template-management authorization and institution
    scoping for preview access.
  status: proposed
  acceptance_criteria:
  - id: AC-010
    title: (FR-007) - Given a user lacks template-management access for the template,
      when they view or invoke preview, then preview controls are unavailable and
      server-side access is denied.
    status: proposed
    verification_method: automated
    proofs: []
- id: FR-008
  title: System SHALL preserve destination-surface fallback and responsive behavior
    for each supported context at the agreed preview breakpoints.
  status: proposed
  acceptance_criteria:
  - id: AC-011
    title: (FR-008) - Given the template cover image is missing or invalid for a supported
      context, when that context renders in the gallery or modal, then fallback visuals
      and messaging match the corresponding destination surface.
    status: proposed
    verification_method: automated
    proofs: []
  - id: AC-012
    title: (FR-008) - Given the agreed desktop and mobile breakpoints, when each
      preview context renders, then layout, spacing, image treatment, and scaled
      full-context composition match the corresponding destination surface.
    status: proposed
    verification_method: automated
    proofs: []
