version: 1
feature: objectives_tile
generated_from: prd.md
requirements:
- title: Render the `Challenging Objectives` tile only when the current section contains
    learning objectives relevant to the selected dashboard scope.
  status: implemented
  id: FR-001
- title: Filter tile results to learning objectives and sub-objectives whose proficiency
    is at or below the existing low-proficiency threshold of `<= 40%` for the active
    scope.
  status: implemented
  id: FR-002
- title: Preserve curriculum ordering and numbering for objectives, and expose expandable
    hierarchy only when qualifying sub-objectives exist for a parent objective.
  status: implemented
  id: FR-003
- title: Support keyboard-accessible expand/collapse behavior with programmatic expanded-state
    semantics for objective rows that have children.
  status: implemented
  id: FR-004
- title: Navigate objective clicks to `Insights -> Learning Objectives` with destination
    context that opens the selected objective in view.
  status: implemented
  id: FR-005
- title: Navigate sub-objective clicks to `Insights -> Learning Objectives` with destination
    context that keeps the relevant sub-objective visible in its parent context.
  status: implemented
  id: FR-006
- title: Provide a `View Learning Objectives` action that opens the full learning-objectives
    view for the section without forcing a row expansion.
  status: implemented
  id: FR-007
- title: Distinguish conditional rendering states for no objectives, no proficiency
    data, and no low-proficiency objectives in the selected scope.
  status: implemented
  id: FR-008
- title: Update tile content deterministically when the global course-content filter
    changes so stale scope results are never shown.
  status: implemented
  id: FR-009
