version: 1
feature: template_preview
generated_from: prd.md
requirements:
- id: FR-001
  title: System SHALL expose a Preview action on Template Overview only to users authorized
    to manage the template section.
  status: verified
  acceptance_criteria:
  - id: AC-001
    title: Given a user with template-management permissions on Template Overview,
      when they view page actions, then a Preview action is visible and enabled.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/live/workspaces/course_author/products/details_live_test.exs:137
    - type: test
      ref: test/oli_web/live/products/details_view_test.exs:335
  - id: AC-002
    title: Given a user without template-management permissions, when they view Template
      Overview or attempt direct preview endpoint access, then Preview is hidden/denied
      and server-side authorization rejects access.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:340
- id: FR-002
  title: On preview request, system SHALL resolve the underlying template-backed section
    and validate institution/tenant scoping before continuing.
  status: verified
  acceptance_criteria:
  - id: AC-003
    title: Given an authorized user without existing student enrollment for the template-backed
      section, when they click Preview, then exactly one student enrollment is created
      and the student home opens in a new window/tab.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/template_preview_test.exs:14
    - type: test
      ref: test/oli_web/live/workspaces/course_author/products/details_live_test.exs:137
    - type: test
      ref: test/oli_web/live/products/details_view_test.exs:335
- id: FR-003
  title: System SHALL ensure the current user has an active student enrollment in
    the resolved section; if absent, create it via idempotent upsert semantics.
  status: verified
  acceptance_criteria:
  - id: AC-004
    title: Given an authorized user already enrolled as a student in that section,
      when they click Preview, then no additional enrollment row is created and launch
      still succeeds.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/template_preview_test.exs:29
    - type: test
      ref: test/oli_web/live/workspaces/course_author/products/details_live_test.exs:163
    - type: test
      ref: test/oli_web/live/products/details_view_test.exs:377
- id: FR-005
  title: When preview is launched by an authorized author/admin without a currently
    logged in user account, system SHALL create or reuse the section's singleton
    hidden instructor account and use that account for preview access.
  status: verified
  acceptance_criteria:
  - id: AC-008
    title: Given an authorized author/admin with no current user session, when they
      click Preview for a section that has no hidden instructor account, then exactly
      one hidden instructor account is created for that section, enrolled as an instructor,
      and preview launch succeeds using that hidden account.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/template_preview_test.exs:39
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:256
  - id: AC-009
    title: Given an authorized author/admin with no current user session, when they
      click Preview for a section that already has a hidden instructor account, then
      that existing hidden instructor account is reused, no second hidden instructor
      is created for the section, and preview launch succeeds.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/template_preview_test.exs:56
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:280
- id: FR-004
  title: System SHALL preserve the user's existing author/admin identity and permissions
    in authoring while enabling student-view launch context for preview.
  status: verified
  acceptance_criteria:
  - id: AC-005
    title: Given an authorized author/admin launches preview, when the student home
      loads, then rendered content and navigation match the standard student delivery
      experience for the same section.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:320
    - type: test
      ref: test/oli_web/components/delivery/layouts_test.exs:96
  - id: AC-010
    title: Given preview or admin section access has established a hidden instructor
      browser session, when the user visits Instructor Workspace, then the active
      hidden delivery account is shown together with a logout action that can be
      used to clear that persistent hidden session before entering a different section
      or template preview.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/live/workspaces/instructor_test.exs:399
  - id: AC-011
    title: Given template preview is active, when the user invokes Exit Preview,
      then template-preview session markers are cleared and, if preview was running
      under a hidden instructor account, that hidden user is also removed from the
      browser session before redirecting back to authoring.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:359
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:381
    - type: test
      ref: test/oli_web/user_auth_test.exs:91
- id: FR-007
  title: System SHALL provide deterministic error handling when enrollment upsert
    or launch URL resolution fails, without partial/duplicate writes.
  status: verified
  acceptance_criteria:
  - id: AC-006
    title: Given enrollment upsert or launch resolution fails, when user clicks Preview,
      then no duplicate enrollments are created, failure feedback is shown, and no
      blank window is left without destination.
    status: verified
    verification_method: automated
    proofs:
    - type: test
      ref: test/oli/delivery/template_preview_test.exs:91
    - type: test
      ref: test/oli_web/controllers/products_controller_test.exs:340
