scenario:
  tags:
    - nightly
    - slow
    - real_time
  timeout_ms: 300000
  reason: "Exercises real elapsed timer behavior for timed assessments that allow late submission."

directives:
  - use:
      file: "setup.yaml"

  - manipulate:
      to: "assessment_settings_section"
      ops:
        - revise:
            target: "Quiz Page"
            set:
              max_attempts: 0
              time_limit: 1
              late_policy: "@atom(allow_late_start_and_late_submit)"

  - visit_page:
      student: "student_1"
      section: "assessment_settings_section"
      page: "Quiz Page"

  - answer_question:
      student: "student_1"
      section: "assessment_settings_section"
      page: "Quiz Page"
      activity_virtual_id: "quiz_q1"
      response: "b"

  - wait:
      seconds: 120

  - finalize_attempt:
      student: "student_1"
      section: "assessment_settings_section"
      page: "Quiz Page"

  - assert:
      gradebook:
        instructor: "instructor_1"
        section: "assessment_settings_section"
        student: "student_1"
        page: "Quiz Page"
        score: 1.0
        out_of: 1.0
        was_late: true
