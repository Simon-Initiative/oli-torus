- use:
    file: "setup.yaml"

- manipulate:
    to: "assessment_settings_section"
    ops:
      - revise:
          target: "Quiz Page"
          set:
            end_date: "2024-12-23T21:00:00Z"
            max_attempts: 0
            time_limit: 0
            late_policy: "@atom(disallow_late_start_and_late_submit)"

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: false
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: "unlimited"
      attempts_summary: "Attempts 0/unlimited"
      next_attempt_ordinal: "1st"
      attempt_message: "The deadline for this assignment has passed."
      terms:
        page_due_terms: "This assignment is available Now and was due on Mon Dec 23, 2024 by 9:00pm."
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."
