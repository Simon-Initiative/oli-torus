- use:
    file: "setup.yaml"

- manipulate:
    to: "assessment_settings_section"
    ops:
      - revise:
          target: "Quiz Page"
          set:
            max_attempts: 0
            time_limit: 0
            password: "secret"

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: "unlimited"
      attempts_summary: "Attempts 0/unlimited"
      next_attempt_ordinal: "1st"
      attempt_message: "You can take this scored page an unlimited number of times"
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."

- start_attempt:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"
    password: "wrong"
    expect: "incorrect_password"

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: "unlimited"
      attempts_summary: "Attempts 0/unlimited"
      next_attempt_ordinal: "1st"
      attempt_message: "You can take this scored page an unlimited number of times"
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."

- start_attempt:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"
    password: "secret"
    expect: "started"

- answer_question:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"
    activity_virtual_id: "quiz_q1"
    response: "b"

- finalize_attempt:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"

- assert:
    gradebook:
      instructor: "instructor_1"
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      score: 1.0
      out_of: 1.0
      was_late: false
