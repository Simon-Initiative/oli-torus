- project:
    name: "assessment_settings_scoring_strategies_source"
    title: "Assessment Settings Scoring Strategies Source Project"
    root:
      children:
        - page: "Scoring Strategies Quiz"

- edit_page:
    project: "assessment_settings_scoring_strategies_source"
    page: "Scoring Strategies Quiz"
    content: |
      title: "Scoring Strategies Quiz"
      graded: true
      blocks:
        - type: activity
          virtual_id: "scoring_q1"
          activity:
            type: oli_multiple_choice
            stem_md: "What is 1 + 1?"
            choices:
              - id: "a"
                body_md: "1"
                score: 0
              - id: "b"
                body_md: "2"
                score: 1
        - type: activity
          virtual_id: "scoring_q2"
          activity:
            type: oli_multiple_choice
            stem_md: "What is 2 + 2?"
            choices:
              - id: "a"
                body_md: "3"
                score: 0
              - id: "b"
                body_md: "4"
                score: 1
        - type: activity
          virtual_id: "scoring_q3"
          activity:
            type: oli_multiple_choice
            stem_md: "What is 3 + 3?"
            choices:
              - id: "a"
                body_md: "5"
                score: 0
              - id: "b"
                body_md: "6"
                score: 1

- publish:
    to: "assessment_settings_scoring_strategies_source"
    description: "Initial scoring strategies quiz page"

- section:
    name: "assessment_settings_scoring_strategies_section"
    title: "Assessment Settings Scoring Strategies Section"
    from: "assessment_settings_scoring_strategies_source"

- user:
    name: "instructor_1"
    type: "instructor"
    email: "assessment_settings_scoring_strategies_instructor@test.edu"

- user:
    name: "student_1"
    type: "student"
    email: "assessment_settings_scoring_strategies_student@test.edu"

- enroll:
    user: "student_1"
    section: "assessment_settings_scoring_strategies_section"
    role: "student"

- manipulate:
    to: "assessment_settings_scoring_strategies_section"
    ops:
      - revise:
          target: "Scoring Strategies Quiz"
          set:
            max_attempts: 0
            time_limit: 0
            scoring_strategy_id: 1

- visit_page:
    student: "student_1"
    section: "assessment_settings_scoring_strategies_section"
    page: "Scoring Strategies Quiz"

- answer_question:
    student: "student_1"
    section: "assessment_settings_scoring_strategies_section"
    page: "Scoring Strategies Quiz"
    activity_virtual_id: "scoring_q1"
    response: "b"

- answer_question:
    student: "student_1"
    section: "assessment_settings_scoring_strategies_section"
    page: "Scoring Strategies Quiz"
