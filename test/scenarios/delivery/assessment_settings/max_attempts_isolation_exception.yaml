- use:
    file: "setup.yaml"

- user:
    name: "student_2"
    type: "student"
    email: "assessment_settings_flow_student_2@test.edu"

- enroll:
    user: "student_2"
    section: "assessment_settings_section"
    role: "student"

- manipulate:
    to: "assessment_settings_section"
    ops:
      - revise:
          target: "Quiz Page"
          set:
            max_attempts: 1
            time_limit: 0

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: 1
      attempts_summary: "Attempts 0/1"
      next_attempt_ordinal: "1st"
      attempt_message: "You have 1 attempt remaining out of 1 total attempt."
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_2"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: 1
      attempts_summary: "Attempts 0/1"
      next_attempt_ordinal: "1st"
      attempt_message: "You have 1 attempt remaining out of 1 total attempt."
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."

- student_exception:
    action: "set"
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"
    set:
      max_attempts: 2

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: 2
      attempts_summary: "Attempts 0/2"
      next_attempt_ordinal: "1st"
      attempt_message: "You have 2 attempts remaining out of 2 total attempts."
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_2"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: 1
      attempts_summary: "Attempts 0/1"
      next_attempt_ordinal: "1st"
      attempt_message: "You have 1 attempt remaining out of 1 total attempt."
      terms:
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."
