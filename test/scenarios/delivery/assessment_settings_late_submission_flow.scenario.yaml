- project:
    name: "assessment_settings_source"
    title: "Assessment Settings Source Project"
    root:
      children:
        - page: "Quiz Page"

- edit_page:
    project: "assessment_settings_source"
    page: "Quiz Page"
    content: |
      title: "Quiz Page"
      graded: true
      blocks:
        - type: activity
          virtual_id: "quiz_q1"
          activity:
            type: oli_multiple_choice
            stem_md: "What is 2 + 2?"
            choices:
              - id: "a"
                body_md: "3"
                score: 0
              - id: "b"
                body_md: "4"
                score: 1

- publish:
    to: "assessment_settings_source"
    description: "Initial graded quiz page"

- section:
    name: "assessment_settings_section"
    title: "Assessment Settings Section"
    from: "assessment_settings_source"

- user:
    name: "instructor_1"
    type: "instructor"
    email: "assessment_settings_flow_instructor@test.edu"

- user:
    name: "student_1"
    type: "student"
    email: "assessment_settings_flow_student@test.edu"

- enroll:
    user: "student_1"
    section: "assessment_settings_section"
    role: "student"

- manipulate:
    to: "assessment_settings_section"
    ops:
      - revise:
          target: "Quiz Page"
          set:
            start_date: "2024-12-22T21:00:00Z"
            end_date: "2024-12-23T21:00:00Z"
            max_attempts: 7
            time_limit: 0
            late_policy: "@atom(allow_late_start_and_late_submit)"

- assert:
    prologue:
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      allow_attempt: true
      show_blocking_gates: false
      attempts_taken: 0
      max_attempts: 7
      attempts_summary: "Attempts 0/7"
      next_attempt_ordinal: "1st"
      attempt_message: "You have 7 attempts remaining out of 7 total attempts."
      terms:
        page_due_terms: "This assignment was available on Sun Dec 22, 2024 at 9:00pm. and was due on Mon Dec 23, 2024 by 9:00pm."
        page_scoring_terms: "For this assignment, your score will be determined by your best attempt."
        page_submit_term: "If you submit after the due date, it will be marked late."

- visit_page:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"

- answer_question:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"
    activity_virtual_id: "quiz_q1"
    response: "b"

- finalize_attempt:
    student: "student_1"
    section: "assessment_settings_section"
    page: "Quiz Page"

- assert:
    gradebook:
      instructor: "instructor_1"
      section: "assessment_settings_section"
      student: "student_1"
      page: "Quiz Page"
      score: 1.0
      out_of: 1.0
      was_late: true
