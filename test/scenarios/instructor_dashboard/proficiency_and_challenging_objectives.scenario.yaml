# Scenario: Proficiency summary and challenging objectives
#
# This scenario focuses on objective-level proficiency rather than page
# completion. It gives one objective strong evidence and another weak evidence,
# then verifies the average class proficiency summary card and the challenging
# objectives panel that lists low-proficiency objectives.

- use:
    file: "base.scenario.yaml"

# One student completes both objectives correctly.
- view_practice_page:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Foundations Lesson 1"

- answer_question:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Foundations Lesson 1"
    activity_virtual_id: "foundations_lesson_1_mcq"
