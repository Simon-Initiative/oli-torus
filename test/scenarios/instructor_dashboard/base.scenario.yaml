      to: "instructor_dashboard_section"
      root:
        children:
          - container: "Foundations Unit"
            children:
              - page: "Foundations Lesson 1"
              - page: "Foundations Lesson 2"
              - page: "Foundations Lesson 3"
          - container: "Applications Unit"
            children:
              - page: "Applications Lesson 1"
              - page: "Applications Lesson 2"
              - page: "Applications Lesson 3"
          - container: "Assessments"
            children:
              - page: "Checkpoint Quiz"
