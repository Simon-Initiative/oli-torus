- dashboard_analytics_ready:
    section: "instructor_dashboard_section"

- assert:
    instructor_dashboard_progress:
      section: "instructor_dashboard_section"
      scope:
        container: "Foundations Unit"
      axis_label: "Course Pages"
      class_size: 4
      items:
        "Foundations Lesson 1":
          completed_count: 2
          completed_percent: 50.0
        "Foundations Lesson 2":
          completed_count: 2
          completed_percent: 50.0
        "Foundations Lesson 3":
          completed_count: 2
          completed_percent: 50.0

- assert:
    instructor_dashboard_challenging_objectives:
      section: "instructor_dashboard_section"
      scope:
        container: "Applications Unit"
      state: "populated"
      row_count: 1
      rows_by_title:
        "Apply problem solving":
          proficiency_label: "Low"

- assert:
    instructor_dashboard_assessments:
      section: "instructor_dashboard_section"
      scope:
        container: "Assessments"
      tolerance: 0.1
      total_rows: 1
      has_assessments: true
      rows_by_title:
        "Checkpoint Quiz":
          completion:
            completed_count: 3
            total_students: 4
            ratio: 0.75
          metrics:
            mean: 50.0
