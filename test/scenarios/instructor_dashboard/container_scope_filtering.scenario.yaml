# Three graded checkpoint submissions make the Assessments container scope
# return only the quiz row.
- visit_page:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Checkpoint Quiz"

- answer_question:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Checkpoint Quiz"
    activity_virtual_id: "checkpoint_foundations_mcq"
    response: "a"

- answer_question:
