# Scenario: Dashboard panels respect selected container scope filters.

- use:
    file: "base.scenario.yaml"

# Two students complete every Foundations page so the Foundations Unit progress
# scope has a distinct 50% completion pattern.
- view_practice_page:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Foundations Lesson 1"

- answer_question:
    student: "student_excelling"
    section: "instructor_dashboard_section"
    page: "Foundations Lesson 1"
    activity_virtual_id: "foundations_lesson_1_mcq"
