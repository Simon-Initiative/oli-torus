# Scenario: Student Support activity filters and custom parameters
#
# This scenario creates one inactive struggling learner and one active
# struggling learner without using fixtures. The older learner is enrolled
# before scenario time advances beyond the inactivity window, while the active
# learner is enrolled after the clock advances. It then verifies active/inactive
# bucket lists and that custom Student Support parameters can reclassify the
# same learners.

- time:
    at: "2026-01-01T12:00:00Z"

- project:
    name: "support_followup_project"
    title: "Student Support Follow-up"
    objectives:
      - "Interpret support signals"
    root:
      children:
        - container: "Support Unit"
          children:
            - page: "Support Lesson 1"
            - page: "Support Lesson 2"
            - page: "Support Lesson 3"

- edit_page:
    project: "support_followup_project"
    page: "Support Lesson 1"
    objectives:
      - "Interpret support signals"
    content: |
      title: "Support Lesson 1"
      graded: false
      blocks:
        - type: activity
          virtual_id: "support_lesson_1_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Support Check 1"
            objectives: ["Interpret support signals"]
            stem_md: "Which option is correct?"
            choices:
              - id: "a"
                body_md: "Correct support signal"
                score: 1
              - id: "b"
                body_md: "Incorrect support signal"

- edit_page:
    project: "support_followup_project"
    page: "Support Lesson 2"
    objectives:
      - "Interpret support signals"
    content: |
      title: "Support Lesson 2"
      graded: false
      blocks:
        - type: activity
          virtual_id: "support_lesson_2_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Support Check 2"
            objectives: ["Interpret support signals"]
            stem_md: "Which option is correct?"
            choices:
              - id: "a"
                body_md: "Correct support signal"
                score: 1
              - id: "b"
                body_md: "Incorrect support signal"

- edit_page:
    project: "support_followup_project"
    page: "Support Lesson 3"
    objectives:
      - "Interpret support signals"
    content: |
      title: "Support Lesson 3"
      graded: false
      blocks:
        - type: activity
          virtual_id: "support_lesson_3_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Support Check 3"
            objectives: ["Interpret support signals"]
            stem_md: "Which option is correct?"
            choices:
              - id: "a"
                body_md: "Correct support signal"
                score: 1
              - id: "b"
                body_md: "Incorrect support signal"

- publish:
    to: "support_followup_project"
    description: "Support follow-up publication"

- section:
    name: "support_followup_section"
    title: "Student Support Follow-up Section"
    from: "support_followup_project"

- user:
    name: "inactive_struggling"
    type: "student"
    email: "inactive_struggling@example.edu"
    given_name: "Inactive"
    family_name: "Struggling"

- user:
    name: "recent_struggling"
    type: "student"
    email: "recent_struggling@example.edu"
    given_name: "Recent"
    family_name: "Struggling"

- enroll:
    user: "inactive_struggling"
    section: "support_followup_section"
    role: "student"

- view_practice_page:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 1"

- answer_question:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 1"
    activity_virtual_id: "support_lesson_1_mcq"
    response: "b"

- view_practice_page:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 2"

- answer_question:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 2"
    activity_virtual_id: "support_lesson_2_mcq"
    response: "b"

- view_practice_page:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 3"

- answer_question:
    student: "inactive_struggling"
    section: "support_followup_section"
    page: "Support Lesson 3"
    activity_virtual_id: "support_lesson_3_mcq"
    response: "b"

- time:
    at: "2026-01-20T12:00:00Z"

- enroll:
    user: "recent_struggling"
    section: "support_followup_section"
    role: "student"

- view_practice_page:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 1"

- answer_question:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 1"
    activity_virtual_id: "support_lesson_1_mcq"
    response: "b"

- view_practice_page:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 2"

- answer_question:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 2"
    activity_virtual_id: "support_lesson_2_mcq"
    response: "b"

- view_practice_page:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 3"

- answer_question:
    student: "recent_struggling"
    section: "support_followup_section"
    page: "Support Lesson 3"
    activity_virtual_id: "support_lesson_3_mcq"
    response: "b"

- dashboard_analytics_ready:
    section: "support_followup_section"

- assert:
    instructor_dashboard_student_support:
      section: "support_followup_section"
      has_activity_data: true
      totals:
        total_students: 2
        active_students: 1
        inactive_students: 1
      buckets:
        struggling:
          count: 2
          active_count: 1
          inactive_count: 1
          active_student_names: ["Recent Struggling"]
          inactive_student_names: ["Inactive Struggling"]

- assert:
    instructor_dashboard_student_support:
      section: "support_followup_section"
      parameters:
        struggling_progress_high_gt: 100
        excelling_progress_gte: 100
      has_activity_data: true
      buckets:
        struggling:
          count: 0
        on_track:
          count: 2
          active_count: 1
          inactive_count: 1
          active_student_names: ["Recent Struggling"]
          inactive_student_names: ["Inactive Struggling"]
