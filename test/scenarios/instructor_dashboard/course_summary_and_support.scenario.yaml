- dashboard_analytics_ready:
    section: "instructor_dashboard_section"

- assert:
    instructor_dashboard_progress:
      section: "instructor_dashboard_section"
      axis_label: "Course Units"
      class_size: 4
      items:
        "Foundations Unit":
          completed_count: 3
          completed_percent: 75.0
        "Applications Unit":
          completed_count: 2
          completed_percent: 50.0
        "Assessments":
          completed_count: 0
          completed_percent: 0.0

- assert:
    instructor_dashboard_student_support:
      section: "instructor_dashboard_section"
      has_activity_data: true
      totals:
        total_students: 4
        active_students: 4
        inactive_students: 0
      buckets:
        struggling:
          count: 1
          student_names: ["Sam Struggling"]
        on_track:
          count: 1
          student_names: ["Olivia On Track"]
        excelling:
          count: 1
          student_names: ["Eli Excelling"]
        not_enough_information:
          count: 1
          student_names: ["Nina No Data"]

- assert:
    instructor_dashboard_summary:
      section: "instructor_dashboard_section"
      tolerance: 0.1
      total_students: 4
      cards:
        average_student_progress:
          status: "ready"
          value_number: 53.6
