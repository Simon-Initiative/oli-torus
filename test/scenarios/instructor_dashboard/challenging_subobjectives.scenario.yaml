# Scenario: Challenging objectives with subobjectives
#
# This scenario verifies that the Challenging Objectives panel preserves
# hierarchy when a low-proficiency subobjective needs instructor attention. The
# assertion checks the parent row and its nested subobjective child.

- project:
    name: "challenging_subobjectives_project"
    title: "Challenging Subobjectives"
    objectives:
      - Apply complex strategies:
        - Select a strategy
        - Review a result
    root:
      children:
        - container: "Strategy Unit"
          children:
            - page: "Strategy Lesson 1"
            - page: "Strategy Lesson 2"
            - page: "Strategy Lesson 3"

- edit_page:
    project: "challenging_subobjectives_project"
    page: "Strategy Lesson 1"
    objectives:
      - "Select a strategy"
    content: |
      title: "Strategy Lesson 1"
      graded: false
      blocks:
        - type: activity
          virtual_id: "strategy_lesson_1_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Strategy Check 1"
            objectives: ["Select a strategy"]
            stem_md: "Which first step is most useful?"
            choices:
              - id: "a"
                body_md: "Choose a strategy based on the problem"
                score: 1
              - id: "b"
                body_md: "Guess without reading"

- edit_page:
    project: "challenging_subobjectives_project"
    page: "Strategy Lesson 2"
    objectives:
      - "Select a strategy"
    content: |
      title: "Strategy Lesson 2"
      graded: false
      blocks:
        - type: activity
          virtual_id: "strategy_lesson_2_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Strategy Check 2"
            objectives: ["Select a strategy"]
            stem_md: "Which behavior supports strategy selection?"
            choices:
              - id: "a"
                body_md: "Compare possible approaches"
                score: 1
              - id: "b"
                body_md: "Repeat the same incorrect approach"

- edit_page:
    project: "challenging_subobjectives_project"
    page: "Strategy Lesson 3"
    objectives:
      - "Select a strategy"
    content: |
      title: "Strategy Lesson 3"
      graded: false
      blocks:
        - type: activity
          virtual_id: "strategy_lesson_3_mcq"
          activity:
            type: "oli_multiple_choice"
            title: "Strategy Check 3"
            objectives: ["Select a strategy"]
            stem_md: "What helps when solving a new problem?"
            choices:
              - id: "a"
                body_md: "Pick an approach intentionally"
                score: 1
              - id: "b"
                body_md: "Ignore the problem context"

