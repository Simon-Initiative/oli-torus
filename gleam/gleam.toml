name = "oli"
version = "0.33.0"
gleam = ">= 1.16.0"

# Default BEAM target for server-side use.
target = "erlang"

[javascript]
typescript_declarations = true
runtime = "node"

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_crypto = ">= 1.6.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
