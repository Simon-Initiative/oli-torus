# Scenario: Seed a minimal published course for image coding delivery automation.

- project:
    name: 'image_coding_delivery_project'
    title: 'Image Coding Delivery Course ${RUN_ID}'
    root:
      children:
        - page: 'Image Coding Practice'
        - page: 'Image Coding Image Practice'
        - page: 'Image Coding Table Practice'

- create_activity:
    project: 'image_coding_delivery_project'
    title: 'Image Coding Question'
    virtual_id: 'image_coding'
    type: 'oli_image_coding'
    content_format: 'json'
    content:
      activityType: 'oli_image_coding'
      stem:
        id: 'image_coding_stem'
        content:
          - type: 'p'
            children:
              - text: 'Run the code and submit the correct output.'
      isExample: false
      starterCode: 'print("wrong")'
      solutionCode: 'print("correct")'
      resourceURLs: []
      tolerance: 1.0
      regex: 'correct'
      feedback:
        - id: 'image_coding_feedback_incorrect'
          content:
            - type: 'p'
              children:
                - text: 'Incorrect. Try again.'
        - id: 'image_coding_feedback_correct'
          content:
            - type: 'p'
              children:
                - text: 'Correct. You produced the expected output.'
      authoring:
        previewText: ''
        transformations: []
        parts:
          - id: '1'
            scoringStrategy: 'best'
            gradingApproach: 'automatic'
            responses:
              - id: 'image_coding_correct'
                rule: 'input like {print("correct")}'
                score: 1
                correct: true
                feedback:
                  id: 'image_coding_response_feedback_correct'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Correct. You produced the expected output.'
              - id: 'image_coding_incorrect'
                rule: 'input like {.*}'
                score: 0
                correct: false
                feedback:
                  id: 'image_coding_response_feedback_incorrect'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Incorrect. Try again.'
            hints: []

- create_activity:
    project: 'image_coding_delivery_project'
    title: 'Image Coding Image Question'
    virtual_id: 'image_coding_image'
    type: 'oli_image_coding'
    content_format: 'json'
    content:
      activityType: 'oli_image_coding'
      stem:
        id: 'image_coding_image_stem'
        content:
          - type: 'p'
            children:
              - text: 'Load the image resource and submit the expected rendered result.'
      isExample: false
      starterCode: 'image = new SimpleImage("image_coding_sample.png"); print(image)'
      solutionCode: 'image = new SimpleImage("image_coding_sample.png"); print(image)'
      resourceURLs:
        - '/test/support/image_coding_sample.png'
      tolerance: 0.1
      regex: ''
      feedback:
        - id: 'image_coding_image_feedback_incorrect'
          content:
            - type: 'p'
              children:
                - text: 'Incorrect. Try again.'
        - id: 'image_coding_image_feedback_correct'
          content:
            - type: 'p'
              children:
                - text: 'Congratulations! you found the GOAT 🐐'
      authoring:
        previewText: ''
        transformations: []
        parts:
          - id: '1'
            scoringStrategy: 'best'
            gradingApproach: 'automatic'
            responses:
              - id: 'image_coding_image_correct'
                rule: 'input like {print(image)}'
                score: 1
                correct: true
                feedback:
                  id: 'image_coding_image_response_feedback_correct'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Congratulations! you found the GOAT 🐐'
              - id: 'image_coding_image_incorrect'
                rule: 'input like {.*}'
                score: 0
                correct: false
                feedback:
                  id: 'image_coding_image_response_feedback_incorrect'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Incorrect. Try again.'
            hints: []

- create_activity:
    project: 'image_coding_delivery_project'
    title: 'Image Coding Table Question'
    virtual_id: 'image_coding_table'
    type: 'oli_image_coding'
    content_format: 'json'
    content:
      activityType: 'oli_image_coding'
      stem:
        id: 'image_coding_table_stem'
        content:
          - type: 'p'
            children:
              - text: 'Load the table resource and submit the expected value.'
      isExample: false
      starterCode: 'var table = new SimpleTable("image_coding_table.csv"); print(table.getRow(0).getField("name"))'
      solutionCode: 'var table = new SimpleTable("image_coding_table.csv"); print(table.getRow(1).getField("value"))'
      resourceURLs:
        - '/test/support/image_coding_table.csv'
      tolerance: 1.0
      regex: '7'
      feedback:
        - id: 'image_coding_table_feedback_incorrect'
          content:
            - type: 'p'
              children:
                - text: 'Incorrect. Try again.'
        - id: 'image_coding_table_feedback_correct'
          content:
            - type: 'p'
              children:
                - text: 'Correct. You produced the expected output.'
      authoring:
        previewText: ''
        transformations: []
        parts:
          - id: '1'
            scoringStrategy: 'best'
            gradingApproach: 'automatic'
            responses:
              - id: 'image_coding_table_correct'
                rule: 'input like {print(table.getRow(1).getField("value"))}'
                score: 1
                correct: true
                feedback:
                  id: 'image_coding_table_response_feedback_correct'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Correct. You produced the expected output.'
              - id: 'image_coding_table_incorrect'
                rule: 'input like {.*}'
                score: 0
                correct: false
                feedback:
                  id: 'image_coding_table_response_feedback_incorrect'
                  content:
                    - type: 'p'
                      children:
                        - text: 'Incorrect. Try again.'
            hints: []

