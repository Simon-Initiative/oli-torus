# Scenario: unpaid learner is past the grace-period window and should be blocked.

- project:
    name: 'student_payment_unpaid_expired_grace_project'
    title: 'Student Payment Unpaid Expired Grace ${RUN_ID}'
    root:
      children:
        - page: 'Paid Course Page'

- edit_page:
    project: 'student_payment_unpaid_expired_grace_project'
    page: 'Paid Course Page'
    content: |
      title: "Paid Course Page"
      graded: false
      blocks:
        - type: prose
          body_md: "Paid course content for the expired-grace paywall case."

- publish:
    to: 'student_payment_unpaid_expired_grace_project'
    description: 'Initial publication for unpaid expired-grace paywall coverage'

- product:
    name: 'student_payment_unpaid_expired_grace_product'
    title: 'Student Payment Unpaid Expired Grace Product ${RUN_ID}'
    from: 'student_payment_unpaid_expired_grace_project'
    requires_payment: true
    payment_options: 'direct_and_deferred'
    amount:
      amount: 25
      currency: 'USD'
    has_grace_period: false

- section:
    name: 'student_payment_unpaid_expired_grace_section'
    title: 'Student Payment Unpaid Expired Grace Section ${RUN_ID}'
    from: 'student_payment_unpaid_expired_grace_product'
    has_grace_period: true
    grace_period_days: 1
    grace_period_strategy: 'relative_to_section'
    start_date: '2000-01-01T00:00:00Z'

- user:
    name: 'student_payment_unpaid_expired_grace_student'
    type: 'student'
    email: 'student-payment-unpaid-expired-grace${RUN_ID}@example.com'
    given_name: 'Unpaid'
    family_name: 'ExpiredGrace'
    password: 'changeme123456'

- enroll:
    user: 'student_payment_unpaid_expired_grace_student'
    section: 'student_payment_unpaid_expired_grace_section'
    role: 'student'
