# Scenario: learner unlocks a paid section after a simulated Cashnet success path.

- project:
    name: 'student_payment_cashnet_unlock_project'
    title: 'Student Payment Cashnet Unlock ${RUN_ID}'
    root:
      children:
        - page: 'Paid Course Page'

- edit_page:
    project: 'student_payment_cashnet_unlock_project'
    page: 'Paid Course Page'
    content: |
      title: "Paid Course Page"
      graded: false
      blocks:
        - type: prose
          body_md: "Paid course content for the Cashnet unlock case."

- publish:
    to: 'student_payment_cashnet_unlock_project'
    description: 'Initial publication for Cashnet unlock coverage'

- product:
    name: 'student_payment_cashnet_unlock_product'
    title: 'Student Payment Cashnet Unlock Product ${RUN_ID}'
    from: 'student_payment_cashnet_unlock_project'
    requires_payment: true
    payment_options: 'direct'
    amount:
      amount: 25
      currency: 'USD'
    has_grace_period: false

- section:
    name: 'student_payment_cashnet_unlock_section'
    title: 'Student Payment Cashnet Unlock Section ${RUN_ID}'
    from: 'student_payment_cashnet_unlock_product'

- user:
    name: 'student_payment_cashnet_unlock_student'
    type: 'student'
    email: 'student-payment-cashnet-unlock${RUN_ID}@example.com'
    given_name: 'Cashnet'
    family_name: 'Unlock'
    password: 'changeme123456'

- enroll:
    user: 'student_payment_cashnet_unlock_student'
    section: 'student_payment_cashnet_unlock_section'
    role: 'student'

- hook:
    function: "Oli.Scenarios.StudentPayment.Hooks.create_pending_cashnet_payment/1"
