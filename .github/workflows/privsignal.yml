name: PrivSignal

on:
  pull_request:
    branches:
      - master
      - hotfix-*
      - prerelease-*
      - nextgen-ux

jobs:
  privsignal:
    name: PrivSignal (informational)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: đź›Žď¸Ź Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: đź§Ş Setup Elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: 1.19.2
          otp-version: 28.1.1

      - name: â¬‡ď¸Ź Install dependencies
        continue-on-error: true
        run: mix deps.get

      - name: đź”¨ Compile PrivSignal dependency
        continue-on-error: true
        run: mix deps.compile priv_signal

      - name: â™»ď¸Ź Regenerate lockfile (informational)
        id: lockfile
        shell: bash
        run: |
          set +e

          mkdir -p tmp/privsignal

          mix priv_signal.scan --quiet --json-path priv_signal.lockfile.json
          scan_exit=$?
          lockfile_changed=false

          if [ "$scan_exit" -eq 0 ]; then
            cp priv_signal.lockfile.json tmp/privsignal/ci.lockfile.json

            if ! git diff --quiet -- priv_signal.lockfile.json; then
              lockfile_changed=true
            fi
          fi

          echo "scan_exit=$scan_exit" >> "$GITHUB_OUTPUT"
          echo "lockfile_changed=$lockfile_changed" >> "$GITHUB_OUTPUT"

          # Informational only.
          exit 0

      - name: â¬†ď¸Ź Commit lockfile to PR branch (same-repo PRs only)
        id: lockfile_push
        if: steps.lockfile.outputs.scan_exit == '0' && steps.lockfile.outputs.lockfile_changed == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set +e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add priv_signal.lockfile.json

          git commit -m "chore(privsignal): refresh lockfile"
          commit_exit=$?

          if [ "$commit_exit" -eq 0 ]; then
            git push
            push_exit=$?
          else
            push_exit=0
          fi

          echo "push_exit=$push_exit" >> "$GITHUB_OUTPUT"

          # Informational only.
          exit 0

      - name: đź”Ž Run PrivSignal diff/score (informational)
        id: privsignal
        if: always()
        shell: bash
        run: |
          set +e

          mkdir -p tmp/privsignal

          DIFF_PATH="tmp/privsignal/ci.diff.json"
          SCORE_PATH="tmp/privsignal/ci.score.json"

          if [ -f "priv_signal.lockfile.json" ]; then
            mix priv_signal.diff \
              --base "${{ github.event.pull_request.base.sha }}" \
              --candidate-path priv_signal.lockfile.json \
              --format json \
              --output "$DIFF_PATH"
            diff_exit=$?
          else
            diff_exit=1
          fi

          if [ "$diff_exit" -eq 0 ]; then
            mix priv_signal.score --diff "$DIFF_PATH" --output "$SCORE_PATH"
            score_exit=$?
          else
            score_exit=1
          fi

          if [ -f "$SCORE_PATH" ]; then
            score=$(jq -r '.score // "ERROR"' "$SCORE_PATH")
          else
            score="ERROR"
          fi

          echo "diff_exit=$diff_exit" >> "$GITHUB_OUTPUT"
          echo "score_exit=$score_exit" >> "$GITHUB_OUTPUT"
          echo "score=$score" >> "$GITHUB_OUTPUT"

          # Informational only.
          exit 0

      - name: đź§ľ Build PrivSignal report
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p tmp/privsignal
          mix run .github/scripts/priv_signal_ci_report.exs -- \
            tmp/privsignal/ci.score.json \
            tmp/privsignal/ci.diff.json \
            tmp/privsignal/ci.report.md \
            tmp/privsignal/ci.report.json \
            25

      - name: đź“Ś Publish job summary
        if: always()
        shell: bash
        run: |
          if [ -f tmp/privsignal/ci.report.md ]; then
            cat tmp/privsignal/ci.report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## PrivSignal (Informational)"
              echo
              echo "Unable to generate report."
              echo
              echo "- scan exit: ${{ steps.lockfile.outputs.scan_exit }}"
              echo "- lockfile changed: ${{ steps.lockfile.outputs.lockfile_changed }}"
              echo "- push exit: ${{ steps.lockfile_push.outputs.push_exit }}"
              echo "- diff exit: ${{ steps.privsignal.outputs.diff_exit }}"
              echo "- score exit: ${{ steps.privsignal.outputs.score_exit }}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: đź“¦ Upload PrivSignal artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: privsignal-artifacts-${{ github.event.pull_request.number }}
          path: |
            priv_signal.lockfile.json
            tmp/privsignal/ci.lockfile.json
            tmp/privsignal/ci.diff.json
            tmp/privsignal/ci.score.json
            tmp/privsignal/ci.report.md
            tmp/privsignal/ci.report.json
          if-no-files-found: warn
