name: Build preview image

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  deployments: write
  packages: write

jobs:
  build-preview-image:
    runs-on: ubuntu-latest

    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository

    outputs:
      app_version: ${{ steps.info.outputs.app_version }}
      preview_url: ${{ steps.info.outputs.preview_url }}
      sha_short: ${{ steps.info.outputs.sha_short }}
      preview_tag: ${{ steps.info.outputs.preview_tag }}

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: 🧾 Build info
        id: info
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "app_version=$(cat mix.exs | grep version | sed -e 's/.*version: "\(.*\)",/\1/')" >> $GITHUB_OUTPUT
          echo "preview_tag=preview-${{ github.event.pull_request.number }}-$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT
          echo "preview_url=https://preview-${{ github.event.pull_request.number }}.plasma.oli.cmu.edu/" >> $GITHUB_OUTPUT

      - name: 🧾 Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/simon-initiative/oli-torus
          tags: |
            type=raw,value=${{ steps.info.outputs.preview_tag }}
            type=raw,value=sha-${{ steps.info.outputs.sha_short }}

      - name: 🔑 Log in to Github Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.info.outputs.app_version }}
            SHA=${{ steps.info.outputs.sha_short }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: 📝 Record GitHub deployment
        uses: actions/github-script@v7
        with:
          script: |
            const environment = `preview-${context.payload.pull_request.number}`;
            const environmentUrl = `${{ steps.info.outputs.preview_url }}`;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              auto_merge: false,
              required_contexts: [],
              environment,
              transient_environment: true,
              production_environment: false,
              description: `Preview image ${{ steps.info.outputs.preview_tag }} published`,
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment,
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Preview image published; Argo CD will reconcile the deployment.',
            });
