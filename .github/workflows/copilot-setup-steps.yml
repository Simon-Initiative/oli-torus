name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    # Set the permissions to the lowest permissions possible needed for your steps.
    # Copilot will be given its own token for its operations.
    permissions:
      # If you want to clone the repository as part of your setup steps, for example to install dependencies, you'll need the `contents: read` permission.
      # If you don't clone the repository in your setup steps, Copilot will do this for you automatically after the steps complete.
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: oli_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oli_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oli_test

    # You can define any steps you want, and they will run before the agent starts.
    # If you do not check out your code, Copilot will do this for you.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure environment
        run: cp oli.example.env oli.env

      - name: Setup Elixir and OTP
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: 1.19.2
          otp-version: 28.1.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "16.14.2"
          cache: yarn
          cache-dependency-path: assets/yarn.lock

      - name: Restore Elixir build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-test-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-test-

      - name: Restore frontend modules cache
        uses: actions/cache@v4
        with:
          path: assets/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('assets/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Install and compile Elixir dependencies
        run: |
          mix deps.get
          mix deps.compile

      - name: Install frontend dependencies
        run: yarn --cwd assets --frozen-lockfile

      - name: Prepare database
        run: |
          set -a
          source oli.env
          MIX_ENV=test mix ecto.create
          MIX_ENV=test mix ecto.migrate

      - name: Verify TypeScript toolchain
        run: yarn --cwd assets run check-types

      - name: Verify Elixir toolchain
        run: |
          mix --version
          mix test
