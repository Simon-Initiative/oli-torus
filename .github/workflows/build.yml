name: Build & Test PR

on:
  pull_request:
    branches:
      - master
      - hotfix-*
      - prerelease-*
      - nextgen-ux

jobs:
  elixir-build-test:
    name: Elixir build and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_DB: oli_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d oli_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MIX_ENV: test
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oli_test

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: 🔍 Detect lockfile-only bot commit
        id: lockfile-only
        shell: bash
        run: |
          lockfile_only=false

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD | sed '/^$/d')"
          else
            changed_files="$(git show --pretty='' --name-only HEAD | sed '/^$/d')"
          fi

          if [ -n "$changed_files" ]; then
            non_lockfile_count="$(echo "$changed_files" | grep -v '^priv_signal.lockfile.json$' | wc -l | tr -d ' ')"
            if [ "$non_lockfile_count" = "0" ]; then
              lockfile_only=true
            fi
          fi

          echo "lockfile_only=$lockfile_only" >> "$GITHUB_OUTPUT"

      - name: ⏭️ Skip heavy Elixir checks for lockfile-only bot commit
        if: steps.lockfile-only.outputs.lockfile_only == 'true'
        run: echo "Skipping Elixir build/test for lockfile-only bot commit."

      - name: 🔧 Configure
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: |
          cp oli.example.env oli.env

      - name: 💾 Restore the deps cache
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        id: mix-deps-cache
        uses: actions/cache@v3
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: 💾 Restore the Node.js cache
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: assets/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('assets/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: 🧪 Setup elixir
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: 1.19.2 # Define the elixir version [required]
          otp-version: 28.1.1 # Define the OTP version [required]

      - name: ⬇️ Install elixir dependencies
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: mix deps.get

      - name: 🔨 Build dependencies
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: mix deps.compile

      - name: 🧹 Clean on master
        if: steps.lockfile-only.outputs.lockfile_only != 'true' && github.ref == 'refs/heads/master'
        run: set -a;source oli.env && mix clean

      - name: 🔨 Build project
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: set -a; source oli.env && mix compile --warnings-as-errors

      - name: 📋 Check Formatting
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: mix format --check-formatted

      - name: ▶️ Run unit tests
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: |
          set -a;source oli.env
          MIX_ENV=test mix ecto.reset
          mix test --trace || if [[ $? = 2  ]]; then mix test --failed; else false; fi # https://angelika.me/2024/01/08/do-not-run-mix-test-failed/

      - name: 📦 Install node_module dependencies
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets --frozen-lockfile

  check-simon-token:
    name: Check simon-bot access token
    runs-on: ubuntu-latest
    outputs:
      available: ${{ steps.check_token.outputs.available }}
    steps:
      - name: Check whether SIMON_BOT_PERSONAL_ACCESS_TOKEN is set
        id: check_token
        run: echo "available=$(if [ "${{ secrets.SIMON_BOT_PERSONAL_ACCESS_TOKEN }}" != "" ] ; then echo true ; else echo false ; fi)" >> $GITHUB_OUTPUT

  auto-format:
    name: Auto format and lint
    runs-on: ubuntu-latest
    needs: check-simon-token
    if: needs.check-simon-token.outputs.available == 'true'

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.SIMON_BOT_PERSONAL_ACCESS_TOKEN }}

      - name: 🔧 Configure
        uses: actions/setup-node@v1
        with:
          node-version: "16.14.2"

      - name: 🧪 Setup elixir
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: 1.19.2 # Define the elixir version [required]
          otp-version: 28.1.1 # Define the OTP version [required]

      - name: ⬇️ Install elixir dependencies
        run: mix deps.get

      - name: 📦 Install node_module dependencies
        run: yarn --cwd assets --frozen-lockfile

      - name: 🤖 Auto format Elixir
        run: mix format

      - name: 🤖 Auto format Typescript
        run: yarn --cwd assets run format

      - name: ✅ Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: Auto format
          committer_name: Simon Bot (GitHub Actions)
          committer_email: simondevbot@gmail.com

  ts-build-test:
    name: TypeScript build and test
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 2
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}

      - name: 🔍 Detect lockfile-only bot commit
        id: lockfile-only
        shell: bash
        run: |
          lockfile_only=false

          if git rev-parse --verify HEAD^ >/dev/null 2>&1; then
            changed_files="$(git diff --name-only HEAD^ HEAD | sed '/^$/d')"
          else
            changed_files="$(git show --pretty='' --name-only HEAD | sed '/^$/d')"
          fi

          if [ -n "$changed_files" ]; then
            non_lockfile_count="$(echo "$changed_files" | grep -v '^priv_signal.lockfile.json$' | wc -l | tr -d ' ')"
            if [ "$non_lockfile_count" = "0" ]; then
              lockfile_only=true
            fi
          fi

          echo "lockfile_only=$lockfile_only" >> "$GITHUB_OUTPUT"

      - name: ⏭️ Skip heavy TypeScript checks for lockfile-only bot commit
        if: steps.lockfile-only.outputs.lockfile_only == 'true'
        run: echo "Skipping TypeScript build/test for lockfile-only bot commit."

      - name: 🔧 Configure
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        uses: actions/setup-node@v1
        with:
          node-version: "16.14.2"

      - name: 🧪 Setup elixir
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        uses: erlef/setup-elixir@v1
        with:
          elixir-version: 1.19.2 # Define the elixir version [required]
          otp-version: 28.1.1 # Define the OTP version [required]

      - name: ⬇️ Install elixir dependencies
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: mix deps.get

      - name: 📦 Install node_module dependencies
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets --frozen-lockfile

      - name: 🧹 Lint
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets run prettier && yarn --cwd assets run lint

      - name: 👁️ Typecheck
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets run check-types

      - name: 🔨 Build
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets run deploy

      - name: ⚙️ Test
        if: steps.lockfile-only.outputs.lockfile_only != 'true'
        run: yarn --cwd assets run test
