name: Nightly Playwright

on:
  schedule:
    - cron: '17 5 * * *'
      timezone: 'America/New_York'
  workflow_dispatch:

jobs:
  nightly-lti:
    name: Nightly LTI Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: nightly-ui
    permissions:
      contents: read

    defaults:
      run:
        working-directory: assets/automation

    env:
      PLAYWRIGHT_HTML_OPEN: never
      CANVAS_UI_EMAIL: ${{ secrets.CANVAS_UI_EMAIL }}
      CANVAS_UI_PASSWORD: ${{ secrets.CANVAS_UI_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: assets/automation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chrome

      - name: Run nightly Playwright tests
        run: npx playwright test --grep @nightly --reporter=line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: assets/automation/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: assets/automation/test-results/
          retention-days: 14
