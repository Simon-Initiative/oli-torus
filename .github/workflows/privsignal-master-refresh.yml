name: PrivSignal Master Refresh

on:
  pull_request_target:
    types:
      - closed
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: read

concurrency:
  group: privsignal-master-refresh
  cancel-in-progress: false

jobs:
  refresh-lockfile:
    name: Refresh priv_signal.lockfile.json from S3
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SIMON_BOT_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SIMON_BOT_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-2
      S3_BUCKET: oli-torus-releases
      PUSH_TOKEN: ${{ secrets.SIMON_BOT_PERSONAL_ACCESS_TOKEN }}

    steps:
      - name: Download stored lockfile from S3
        id: stored
        run: |
          set -euo pipefail

          aws --version

          s3_key="privsignal/priv_signal.lockfile.json"
          s3_uri="s3://${S3_BUCKET}/${s3_key}"
          candidate_file="$(mktemp)"

          aws s3 cp "${s3_uri}" "${candidate_file}" --region "${AWS_REGION}"
          echo "found=true" >> "${GITHUB_OUTPUT}"
          echo "candidate_path=${candidate_file}" >> "${GITHUB_OUTPUT}"
          echo "s3_uri=${s3_uri}" >> "${GITHUB_OUTPUT}"

      - name: Checkout master branch
        if: ${{ steps.stored.outputs.found == 'true' }}
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 1
          token: ${{ secrets.SIMON_BOT_PERSONAL_ACCESS_TOKEN }}

      - name: Commit lockfile directly to master (if changed)
        if: ${{ steps.stored.outputs.found == 'true' }}
        env:
          CANDIDATE_PATH: ${{ steps.stored.outputs.candidate_path }}
        run: |
          set -euo pipefail

          if [ -z "${PUSH_TOKEN}" ]; then
            echo "SIMON_BOT_PERSONAL_ACCESS_TOKEN is required for direct protected-branch push."
            exit 1
          fi

          target_path="priv_signal.lockfile.json"
          if [ -f "${target_path}" ] && cmp -s "${target_path}" "${CANDIDATE_PATH}"; then
            echo "priv_signal.lockfile.json is unchanged; skipping commit."
            exit 0
          fi

          cp "${CANDIDATE_PATH}" "${target_path}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${target_path}"

          if git diff --cached --quiet; then
            echo "No staged changes; skipping commit."
            exit 0
          fi

          git commit -m "chore(privsignal): update lockfile [skip ci]"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:master
