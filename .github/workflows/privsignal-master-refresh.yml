name: PrivSignal Master Refresh

on:
  pull_request_target:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: read

concurrency:
  group: privsignal-master-refresh
  cancel-in-progress: false

jobs:
  refresh-lockfile:
    name: Refresh priv_signal.lockfile.json from S3
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SIMON_BOT_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SIMON_BOT_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-2
      S3_BUCKET: oli-torus-releases
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Download stored PR lockfile from S3
        id: stored
        run: |
          set -euo pipefail

          aws --version

          pr_number="${{ github.event.pull_request.number }}"
          s3_key="privsignal/pr-${pr_number}/priv_signal.lockfile.json"
          s3_uri="s3://${S3_BUCKET}/${s3_key}"
          candidate_file="$(mktemp)"
          err_file="$(mktemp)"

          if aws s3api head-object \
            --bucket "${S3_BUCKET}" \
            --key "${s3_key}" \
            --region "${AWS_REGION}" >/dev/null 2>"${err_file}"; then
            aws s3 cp "${s3_uri}" "${candidate_file}" --region "${AWS_REGION}"
            echo "found=true" >> "${GITHUB_OUTPUT}"
            echo "candidate_path=${candidate_file}" >> "${GITHUB_OUTPUT}"
            echo "s3_uri=${s3_uri}" >> "${GITHUB_OUTPUT}"
          else
            if grep -qiE 'Not Found|404|NoSuchKey' "${err_file}"; then
              echo "No lockfile found in ${s3_uri}; skipping refresh."
              echo "found=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            echo "Failed to query ${s3_uri}."
            cat "${err_file}"
            exit 1
          fi

      - name: Commit lockfile to master via Contents REST API (if changed)
        if: ${{ steps.stored.outputs.found == 'true' }}
        env:
          CANDIDATE_PATH: ${{ steps.stored.outputs.candidate_path }}
        run: |
          set -euo pipefail

          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          target_path="priv_signal.lockfile.json"
          get_resp="$(mktemp)"
          current_file="$(mktemp)"

          http_code="$({
            curl -sSL -o "${get_resp}" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_root}/contents/${target_path}?ref=master"
          } || true)"

          current_sha=""

          if [ "${http_code}" = "200" ]; then
            current_sha="$(jq -r '.sha // ""' "${get_resp}")"
            jq -r '.content // ""' "${get_resp}" | tr -d '\n' | base64 --decode > "${current_file}"

            if cmp -s "${current_file}" "${CANDIDATE_PATH}"; then
              echo "priv_signal.lockfile.json is unchanged; skipping commit."
              exit 0
            fi
          elif [ "${http_code}" = "404" ]; then
            echo "priv_signal.lockfile.json does not exist on master yet; creating it."
          else
            echo "Failed to read current lockfile from master (HTTP ${http_code})."
            cat "${get_resp}"
            exit 1
          fi

          new_content_b64="$(base64 < "${CANDIDATE_PATH}" | tr -d '\n')"

          if [ -n "${current_sha}" ]; then
            payload="$(jq -n \
              --arg message "chore(privsignal): update lockfile [skip ci]" \
              --arg content "${new_content_b64}" \
              --arg branch "master" \
              --arg sha "${current_sha}" \
              --arg bot_name "github-actions[bot]" \
              --arg bot_email "41898282+github-actions[bot]@users.noreply.github.com" \
              '{
                message: $message,
                content: $content,
                branch: $branch,
                sha: $sha,
                committer: {name: $bot_name, email: $bot_email},
                author: {name: $bot_name, email: $bot_email}
              }')"
          else
            payload="$(jq -n \
              --arg message "chore(privsignal): update lockfile [skip ci]" \
              --arg content "${new_content_b64}" \
              --arg branch "master" \
              --arg bot_name "github-actions[bot]" \
              --arg bot_email "41898282+github-actions[bot]@users.noreply.github.com" \
              '{
                message: $message,
                content: $content,
                branch: $branch,
                committer: {name: $bot_name, email: $bot_email},
                author: {name: $bot_name, email: $bot_email}
              }')"
          fi

          put_resp="$(mktemp)"

          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_root}/contents/${target_path}" \
            -d "${payload}" \
            -o "${put_resp}"

          commit_sha="$(jq -r '.commit.sha // ""' "${put_resp}")"

          if [ -n "${commit_sha}" ]; then
            echo "Committed updated lockfile to master at ${commit_sha}."
          else
            echo "Unexpected response while updating lockfile:"
            cat "${put_resp}"
            exit 1
          fi
