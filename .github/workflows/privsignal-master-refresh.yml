name: PrivSignal Master Refresh

on:
  push:
    branches:
      - master
    paths-ignore:
      - priv_signal.lockfile.json

permissions:
  contents: write
  pull-requests: write
  actions: read
  issues: write

concurrency:
  group: privsignal-master-refresh
  cancel-in-progress: false

jobs:
  refresh-lockfile:
    name: Refresh priv_signal.lockfile.json from PR artifact
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve merged PR from push commit
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;

            const pulls = await github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit, {
              owner,
              repo,
              commit_sha: commitSha,
              per_page: 100
            });

            const mergedToMaster = pulls
              .filter((pr) => pr.merged_at && pr.base?.ref === "master")
              .sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at));

            if (mergedToMaster.length === 0) {
              core.notice(`No merged PR associated with commit ${commitSha}; skipping lockfile refresh.`);
              core.setOutput("number", "");
              core.setOutput("head_sha", "");
              return;
            }

            const pr = mergedToMaster[0];
            core.setOutput("number", String(pr.number));
            core.setOutput("head_sha", pr.head?.sha || "");
            core.notice(`Resolved PR #${pr.number} for commit ${commitSha}.`);

      - name: Find latest successful PrivSignal PR check run
        id: run
        if: ${{ steps.pr.outputs.number != '' }}
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflowId = "privsignal-pr-check.yml";
            const prNumber = Number(process.env.PR_NUMBER);
            const prHeadSha = process.env.PR_HEAD_SHA || "";

            const normalizeRuns = (runs) =>
              (Array.isArray(runs) ? runs : []).filter((run) => run && typeof run === "object");

            const matchesPr = (run) =>
              !!run &&
              run.conclusion === "success" &&
              Array.isArray(run.pull_requests) &&
              run.pull_requests.some((pr) => pr && pr.number === prNumber);

            let candidateRuns = [];

            if (prHeadSha) {
              const byHead = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: "pull_request",
                status: "completed",
                head_sha: prHeadSha,
                per_page: 100
              });

              candidateRuns = normalizeRuns(byHead?.data?.workflow_runs).filter(matchesPr);
            }

            if (candidateRuns.length === 0) {
              const allRuns = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: workflowId,
                  event: "pull_request",
                  status: "completed",
                  per_page: 100
                },
                (response) => response.data.workflow_runs
              );

              candidateRuns = normalizeRuns(allRuns).filter(matchesPr);
            }

            if (candidateRuns.length === 0) {
              core.notice(`No successful ${workflowId} run found for PR #${prNumber}; skipping lockfile refresh.`);
              core.setOutput("id", "");
              return;
            }

            candidateRuns.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const run = candidateRuns[0];

            core.setOutput("id", String(run.id));
            core.notice(`Using workflow run ${run.id} (${run.html_url}) for PR #${prNumber}.`);

      - name: Download privsignal-lockfile artifact via REST API
        id: artifact
        if: ${{ steps.run.outputs.id != '' }}
        env:
          RUN_ID: ${{ steps.run.outputs.id }}
        run: |
          set -euo pipefail

          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          artifacts_json="$(mktemp)"
          archive_zip="$(mktemp).zip"
          extract_dir="$(mktemp -d)"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_root}/actions/runs/${RUN_ID}/artifacts?per_page=100" \
            -o "${artifacts_json}"

          artifact_id="$(
            jq -r '
              .artifacts
              | map(select(.name == "privsignal-lockfile" and (.expired | not)))
              | sort_by(.created_at)
              | last
              | .id // ""
            ' "${artifacts_json}"
          )"

          if [ -z "${artifact_id}" ]; then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            echo "No non-expired privsignal-lockfile artifact found for run ${RUN_ID}."
            exit 0
          fi

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_root}/actions/artifacts/${artifact_id}/zip" \
            -o "${archive_zip}"

          unzip -q -o "${archive_zip}" -d "${extract_dir}"

          candidate_path="$(find "${extract_dir}" -type f -name "priv_signal.lockfile.json" | head -n 1)"

          if [ -z "${candidate_path}" ]; then
            echo "found=false" >> "${GITHUB_OUTPUT}"
            echo "Artifact ${artifact_id} did not contain priv_signal.lockfile.json."
            exit 0
          fi

          echo "found=true" >> "${GITHUB_OUTPUT}"
          echo "candidate_path=${candidate_path}" >> "${GITHUB_OUTPUT}"

      - name: Commit lockfile to master via Contents REST API (if changed)
        if: ${{ steps.artifact.outputs.found == 'true' }}
        env:
          CANDIDATE_PATH: ${{ steps.artifact.outputs.candidate_path }}
        run: |
          set -euo pipefail

          api_root="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          target_path="priv_signal.lockfile.json"
          get_resp="$(mktemp)"
          current_file="$(mktemp)"

          http_code="$(
            curl -sSL -o "${get_resp}" -w "%{http_code}" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_root}/contents/${target_path}?ref=master"
          )"

          current_sha=""

          if [ "${http_code}" = "200" ]; then
            current_sha="$(jq -r '.sha // ""' "${get_resp}")"
            jq -r '.content // ""' "${get_resp}" | tr -d '\n' | base64 --decode > "${current_file}"

            if cmp -s "${current_file}" "${CANDIDATE_PATH}"; then
              echo "priv_signal.lockfile.json is unchanged; skipping commit."
              exit 0
            fi
          elif [ "${http_code}" = "404" ]; then
            echo "priv_signal.lockfile.json does not exist on master yet; creating it."
          else
            echo "Failed to read current lockfile from master (HTTP ${http_code})."
            cat "${get_resp}"
            exit 1
          fi

          new_content_b64="$(base64 < "${CANDIDATE_PATH}" | tr -d '\n')"

          if [ -n "${current_sha}" ]; then
            payload="$(
              jq -n \
                --arg message "chore(privsignal): update lockfile [skip ci]" \
                --arg content "${new_content_b64}" \
                --arg branch "master" \
                --arg sha "${current_sha}" \
                --arg bot_name "github-actions[bot]" \
                --arg bot_email "41898282+github-actions[bot]@users.noreply.github.com" \
                '{
                  message: $message,
                  content: $content,
                  branch: $branch,
                  sha: $sha,
                  committer: {name: $bot_name, email: $bot_email},
                  author: {name: $bot_name, email: $bot_email}
                }'
            )"
          else
            payload="$(
              jq -n \
                --arg message "chore(privsignal): update lockfile [skip ci]" \
                --arg content "${new_content_b64}" \
                --arg branch "master" \
                --arg bot_name "github-actions[bot]" \
                --arg bot_email "41898282+github-actions[bot]@users.noreply.github.com" \
                '{
                  message: $message,
                  content: $content,
                  branch: $branch,
                  committer: {name: $bot_name, email: $bot_email},
                  author: {name: $bot_name, email: $bot_email}
                }'
            )"
          fi

          put_resp="$(mktemp)"

          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_root}/contents/${target_path}" \
            -d "${payload}" \
            -o "${put_resp}"

          commit_sha="$(jq -r '.commit.sha // ""' "${put_resp}")"

          if [ -n "${commit_sha}" ]; then
            echo "Committed updated lockfile to master at ${commit_sha}."
          else
            echo "Unexpected response while updating lockfile:"
            cat "${put_resp}"
            exit 1
          fi
